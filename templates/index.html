<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Transcriptor de Video</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f0f17;
      color: #cdd6f4;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
    }
    h1 { font-size: 28px; margin-bottom: 8px; color: #89b4fa; }
    p.sub { color: #a6adc8; margin-bottom: 32px; font-size: 14px; }

    #zona-drop {
      width: 100%;
      max-width: 640px;
      border: 2px dashed #45475a;
      border-radius: 16px;
      padding: 60px 20px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      background: #1e1e2e;
    }
    #zona-drop.drag-over { border-color: #89b4fa; background: #1a1a2e; }
    #zona-drop .icono { font-size: 48px; margin-bottom: 12px; }
    #zona-drop p { color: #a6adc8; font-size: 15px; }
    #zona-drop strong { color: #cdd6f4; }
    #file-input { display: none; }

    #nombre-archivo { margin-top: 12px; color: #a6e3a1; font-size: 14px; min-height: 20px; }

    #progress-bar-container {
      width: 100%; max-width: 640px;
      background: #313244; border-radius: 8px;
      margin-top: 12px; display: none; height: 8px;
    }
    #progress-bar {
      height: 8px; background: #89b4fa;
      border-radius: 8px; width: 0%;
      transition: width 0.3s;
    }

    button#btn-transcribir {
      margin-top: 20px;
      padding: 12px 36px;
      background: #89b4fa;
      color: #1e1e2e;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    button#btn-transcribir:disabled { opacity: 0.4; cursor: not-allowed; }

    #estado { margin-top: 16px; font-size: 14px; color: #f9e2af; min-height: 20px; }

    #resultado {
      margin-top: 24px; width: 100%; max-width: 640px;
      background: #1e1e2e; border-radius: 12px;
      padding: 20px; display: none;
    }
    #resultado h2 { font-size: 16px; color: #89b4fa; margin-bottom: 12px; }
    #texto-transcripcion {
      white-space: pre-wrap; font-size: 14px; line-height: 1.7;
      color: #cdd6f4; max-height: 400px; overflow-y: auto;
    }
    #btn-copiar {
      margin-top: 16px; padding: 8px 20px;
      background: #313244; color: #cdd6f4;
      border: none; border-radius: 8px;
      cursor: pointer; font-size: 13px;
    }
    #btn-copiar:hover { background: #45475a; }
  </style>
</head>
<body>
  <h1>Transcriptor de Video</h1>
  <p class="sub">Arrastrá tu video o audio y obtené la transcripción en segundos</p>

  <div id="zona-drop">
    <div class="icono">🎬</div>
    <p><strong>Arrastrá tu video o audio aquí</strong></p>
    <p>MP4, MOV, AVI, MP3, M4A, WAV — o hacé clic para buscar</p>
    <input type="file" id="file-input" accept="video/*,audio/*,.mp3,.m4a,.wav,.ogg" />
  </div>

  <div id="nombre-archivo"></div>
  <div id="progress-bar-container"><div id="progress-bar"></div></div>
  <button id="btn-transcribir" disabled>Transcribir</button>
  <div id="estado"></div>

  <div id="resultado">
    <h2>Transcripción</h2>
    <div id="texto-transcripcion"></div>
    <button id="btn-copiar">Copiar texto</button>
  </div>

  <script>
    const zona = document.getElementById("zona-drop");
    const fileInput = document.getElementById("file-input");
    const nombreArchivo = document.getElementById("nombre-archivo");
    const btnTranscribir = document.getElementById("btn-transcribir");
    const estadoDiv = document.getElementById("estado");
    const resultado = document.getElementById("resultado");
    const textoDiv = document.getElementById("texto-transcripcion");
    const btnCopiar = document.getElementById("btn-copiar");
    const progressContainer = document.getElementById("progress-bar-container");
    const progressBar = document.getElementById("progress-bar");

    let archivoSeleccionado = null;

    zona.addEventListener("click", () => fileInput.click());
    zona.addEventListener("dragover", (e) => { e.preventDefault(); zona.classList.add("drag-over"); });
    zona.addEventListener("dragleave", () => zona.classList.remove("drag-over"));
    zona.addEventListener("drop", (e) => {
      e.preventDefault();
      zona.classList.remove("drag-over");
      if (e.dataTransfer.files[0]) seleccionarArchivo(e.dataTransfer.files[0]);
    });
    fileInput.addEventListener("change", () => {
      if (fileInput.files[0]) seleccionarArchivo(fileInput.files[0]);
    });

    function seleccionarArchivo(archivo) {
      archivoSeleccionado = archivo;
      nombreArchivo.textContent = "📄 " + archivo.name;
      btnTranscribir.disabled = false;
      estadoDiv.textContent = "";
      resultado.style.display = "none";
    }

    btnTranscribir.addEventListener("click", async () => {
      if (!archivoSeleccionado) return;
      btnTranscribir.disabled = true;
      resultado.style.display = "none";

      const sessionId = crypto.randomUUID();
      const CHUNK_SIZE = 5 * 1024 * 1024; // 5MB por chunk
      const totalChunks = Math.ceil(archivoSeleccionado.size / CHUNK_SIZE);

      progressContainer.style.display = "block";
      progressBar.style.width = "0%";

      // Subir en chunks
      for (let i = 0; i < totalChunks; i++) {
        const inicio = i * CHUNK_SIZE;
        const chunk = archivoSeleccionado.slice(inicio, inicio + CHUNK_SIZE);
        const form = new FormData();
        form.append("session_id", sessionId);
        form.append("chunk_index", i);
        form.append("total_chunks", totalChunks);
        form.append("nombre", archivoSeleccionado.name);
        form.append("chunk", chunk);

        estadoDiv.textContent = `Subiendo parte ${i+1} de ${totalChunks}...`;
        await fetch("/chunk", { method: "POST", body: form });
        progressBar.style.width = ((i + 1) / totalChunks * 50) + "%";
      }

      estadoDiv.textContent = "Procesando...";
      pollEstado(sessionId);
    });

    function pollEstado(sessionId) {
      const intervalo = setInterval(async () => {
        const res = await fetch("/estado/" + sessionId);
        const data = await res.json();
        estadoDiv.textContent = data.estado;

        if (data.estado === "listo") {
          clearInterval(intervalo);
          progressBar.style.width = "100%";
          setTimeout(() => progressContainer.style.display = "none", 500);
          btnTranscribir.disabled = false;
          textoDiv.textContent = data.texto;
          resultado.style.display = "block";
        } else if (data.estado === "error") {
          clearInterval(intervalo);
          progressContainer.style.display = "none";
          btnTranscribir.disabled = false;
          estadoDiv.textContent = "Error: " + data.texto;
        } else {
          // Actualizar barra durante procesamiento
          const match = data.estado.match(/parte (\d+)\/(\d+)/);
          if (match) {
            const pct = 50 + (parseInt(match[1]) / parseInt(match[2])) * 50;
            progressBar.style.width = pct + "%";
          }
        }
      }, 2000);
    }

    btnCopiar.addEventListener("click", () => {
      navigator.clipboard.writeText(textoDiv.textContent);
      btnCopiar.textContent = "¡Copiado!";
      setTimeout(() => btnCopiar.textContent = "Copiar texto", 2000);
    });
  </script>
</body>
</html>
